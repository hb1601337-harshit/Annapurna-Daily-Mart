<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="bg-black text-yellow-400 p-6 rounded-3xl mb-6 shadow-xl">
        <h1 class="text-xl font-black italic">Annapurna Admin Hub</h1>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-sm mb-6">
        <h3 class="font-bold mb-4">Add New Item</h3>
        <input type="text" id="n" placeholder="Name" class="w-full bg-gray-50 p-3 rounded-xl mb-3 border outline-none">
        <input type="number" id="p" placeholder="Price" class="w-full bg-gray-50 p-3 rounded-xl mb-3 border outline-none">
        <input type="text" id="i" placeholder="Image URL" class="w-full bg-gray-50 p-3 rounded-xl mb-3 border outline-none">
        <button onclick="add()" class="w-full bg-green-700 text-white p-4 rounded-xl font-black">UPDATE STOCK 🚀</button>
    </div>

    <div id="inv" class="space-y-2"></div>

    <script>
        const DB = "https://kirana-pro-default-rtdb.firebaseio.com/";
        async function add() {
            const name = document.getElementById('n').value;
            const price = document.getElementById('p').value;
            const image = document.getElementById('i').value;
            if(!name || !price) return alert("Bhai details daalo!");
            await fetch(DB + "p_" + Date.now() + ".json", { method: 'PUT', body: JSON.stringify({name, price, image}) });
            location.reload();
        }
        async function load() {
            const res = await fetch(DB + ".json");
            const data = await res.json() || {};
            const inv = document.getElementById('inv');
            inv.innerHTML = "";
            for(let id in data) {
                if(id === "orders" || id === "settings") continue;
                inv.innerHTML += `<div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm">
                    <span class="text-xs font-bold">${data[id].name} - ₹${data[id].price}</span>
                    <button onclick="del('${id}')" class="text-red-500 font-bold">Delete</button>
                </div>`;
            }
        }
        async function del(id) { if(confirm("Hata dein?")) { await fetch(DB + id + ".json", {method:'DELETE'}); load(); } }
        load();
    </script>
</body>
</html>
