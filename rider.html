<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-5">
    <h1 class="text-[#f7d150] font-black italic text-xl mb-8">Rider Partner Beawar</h1>
    <div id="orders" class="space-y-4"></div>

    <script>
        const DB = "https://kirana-pro-default-rtdb.firebaseio.com/orders.json";
        async function fetchOrders() {
            const res = await fetch(DB);
            const data = await res.json() || {};
            const box = document.getElementById('orders');
            box.innerHTML = "";
            for(let id in data) {
                if(data[id].status === "Pending") {
                    box.innerHTML += `<div class="bg-gray-900 p-5 rounded-3xl border border-gray-800">
                        <p class="text-[#f7d150] font-black mb-2">New Order: #${id.slice(-4)}</p>
                        <p class="text-xs text-gray-400 mb-4 font-bold">📍 Beawar Hub to Customer</p>
                        <button onclick="alert('Accepted!')" class="w-full bg-white text-black font-black p-3 rounded-xl">ACCEPT DELIVERY</button>
                    </div>`;
                }
            }
        }
        setInterval(fetchOrders, 5000);
        fetchOrders();
    </script>
</body>
</html>
