<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annapurna Daily Mart | Beawar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; transition: 0.3s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .splash-fade { animation: fadeOut 0.5s ease-in 2.5s forwards; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <div id="splash" class="fixed inset-0 bg-green-600 z-[1000] flex flex-col items-center justify-center splash-fade">
        <div class="bg-white p-6 rounded-[40px] shadow-2xl animate-bounce mb-4">
            <i class="fa-solid fa-cart-shopping text-green-600 text-6xl"></i>
        </div>
        <h1 class="text-4xl font-black text-white italic tracking-tighter">Annapurna Mart</h1>
        <p class="text-green-100 font-bold tracking-[4px] text-xs mt-2 uppercase">Fastest in Beawar</p>
    </div>

    <header class="bg-white sticky top-0 z-50 p-4 shadow-sm">
        <div class="flex justify-between items-center mb-4">
            <div onclick="showAddrModal()" class="flex items-center gap-2 cursor-pointer">
                <div class="bg-green-100 p-2 rounded-full text-green-600"><i class="fa-solid fa-location-dot"></i></div>
                <div class="max-w-[180px]">
                    <p class="text-[10px] font-black text-gray-400 uppercase leading-none">Deliver to</p>
                    <p id="displayAddr" class="text-sm font-extrabold truncate text-gray-800">Select Address...</p>
                </div>
                <i class="fa-solid fa-chevron-down text-[10px] text-green-600"></i>
            </div>
            <div class="h-10 w-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 border"><i class="fa-solid fa-user"></i></div>
        </div>
        <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" onkeyup="searchItems(this.value)" placeholder="Search 'Atta', 'Ghee', 'Chips'..." class="w-full bg-gray-100 p-4 pl-12 rounded-2xl text-sm font-bold border-none outline-none focus:ring-2 focus:ring-green-500">
        </div>
    </header>

    <main id="appContent" class="p-4 space-y-8 pb-32">
        <p class="text-center text-gray-400 py-20 font-bold">Checking freshness...</p>
    </main>

    <div id="cartBar" class="fixed bottom-24 left-4 right-4 bg-green-700 text-white p-4 rounded-2xl flex justify-between items-center shadow-2xl hidden z-50 animate-up">
        <div class="flex flex-col">
            <p id="cartCount" class="text-[10px] font-black uppercase opacity-80">0 ITEMS</p>
            <p id="cartTotal" class="font-black text-xl">₹0</p>
        </div>
        <button onclick="showCheckout()" class="bg-white text-green-700 px-6 py-2.5 rounded-xl font-black text-sm">View Cart <i class="fa-solid fa-chevron-right ml-1"></i></button>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-4 z-[60] shadow-2xl">
        <div onclick="switchView('home')" class="flex flex-col items-center text-green-600 font-black"><i class="fa-solid fa-house text-xl"></i><span class="text-[9px] mt-1">HOME</span></div>
        <div onclick="switchView('cat')" class="flex flex-col items-center text-gray-400 font-black"><i class="fa-solid fa-grip text-xl"></i><span class="text-[9px] mt-1">CATEGORY</span></div>
        <div onclick="alert('Coming soon!')" class="flex flex-col items-center text-gray-400 font-black"><i class="fa-solid fa-clock-rotate-left text-xl"></i><span class="text-[9px] mt-1">HISTORY</span></div>
    </nav>

    <div id="addrModal" class="hidden fixed inset-0 bg-black/60 z-[200] flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 animate-up">
            <h2 class="text-2xl font-black mb-6">Enter Address</h2>
            <div class="space-y-4">
                <input id="in-bldg" type="text" placeholder="Building/Flat Name" class="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none">
                <input id="in-area" type="text" placeholder="Area/Street" class="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none">
                <input id="in-land" type="text" placeholder="Landmark" class="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none">
                <button onclick="saveAddr()" class="w-full bg-green-600 text-white p-5 rounded-2xl font-black">SAVE & PROCEED</button>
            </div>
        </div>
    </div>

    <div id="checkoutPage" class="hidden fixed inset-0 bg-white z-[150] overflow-y-auto">
        <div class="p-5 border-b sticky top-0 bg-white flex items-center gap-4 z-10">
            <i onclick="hideCheckout()" class="fa-solid fa-arrow-left text-2xl"></i>
            <h2 class="font-black text-xl italic">Review Cart</h2>
        </div>
        <div id="checkoutList" class="p-5 space-y-4"></div>
        <div class="p-6 bg-gray-50 m-4 rounded-3xl">
            <h3 class="font-bold text-sm mb-3">Choose Payment Mode</h3>
            <div class="space-y-2">
                <button onclick="setPay('UPI')" id="btn-upi" class="w-full p-4 border-2 rounded-2xl font-bold text-left flex justify-between">UPI Payment <span class="text-green-600">₹20 OFF</span></button>
                <button onclick="setPay('COD')" id="btn-cod" class="w-full p-4 border-2 rounded-2xl font-bold text-left">Cash on Delivery</button>
            </div>
        </div>
        <div class="p-6 fixed bottom-0 w-full bg-white border-t">
            <button onclick="finalOrder()" class="w-full bg-green-700 text-white p-5 rounded-2xl font-black text-lg shadow-xl">ORDER ON WHATSAPP</button>
        </div>
    </div>

    <script>
        const db = "https://kirana-pro-default-rtdb.firebaseio.com/.json";
        let cart = {}; let userAddr = localStorage.getItem('annapurna_addr') || ""; let payMode = "UPI";

        // Splash Hide
        setTimeout(() => document.getElementById('splash').remove(), 3000);

        if(userAddr) document.getElementById('displayAddr').innerText = userAddr;
        function showAddrModal() { document.getElementById('addrModal').classList.remove('hidden'); }
        function saveAddr() {
            let addr = `${document.getElementById('in-bldg').value}, ${document.getElementById('in-area').value} (${document.getElementById('in-land').value})`;
            localStorage.setItem('annapurna_addr', addr);
            document.getElementById('displayAddr').innerText = addr;
            document.getElementById('addrModal').classList.add('hidden');
        }

        async function loadItems() {
            const res = await fetch(db); const data = await res.json() || {};
            const main = document.getElementById('appContent'); main.innerHTML = "";
            const cats = ["Grocery & Kitchen", "Snacks & Drinks", "Personal Care", "Household"];
            
            cats.forEach(c => {
                let items = Object.keys(data).filter(id => data[id].category === c);
                if(items.length > 0) {
                    let html = `<div class="p-2"><h2 class="font-black text-xl mb-4 italic">${c}</h2><div class="grid grid-cols-2 gap-4">`;
                    items.forEach(id => {
                        html += `
                        <div class="bg-white p-3 rounded-[30px] border shadow-sm flex flex-col items-center product-card" data-name="${data[id].name}">
                            <img src="${data[id].image || ''}" class="h-24 object-contain mb-2">
                            <h3 class="text-[11px] font-bold text-center h-8 leading-tight mb-2">${data[id].name}</h3>
                            <div class="flex justify-between items-center w-full mt-auto">
                                <span class="text-green-700 font-black">₹${data[id].price}</span>
                                <div class="flex items-center bg-green-50 rounded-xl p-1">
                                    <button onclick="add('${data[id].name}', ${data[id].price}, -1)" class="w-7 h-7 bg-white rounded-lg shadow-sm font-black">-</button>
                                    <span id="q-${data[id].name.replace(/\s/g,'')}" class="px-2 text-xs font-bold">0</span>
                                    <button onclick="add('${data[id].name}', ${data[id].price}, 1)" class="w-7 h-7 bg-green-600 text-white rounded-lg shadow-sm font-black">+</button>
                                </div>
                            </div>
                        </div>`;
                    });
                    main.innerHTML += html + `</div></div>`;
                }
            });
        }

        function add(n, p, d) {
            if(!cart[n]) cart[n] = {p, q:0};
            cart[n].q += d; if(cart[n].q <= 0) delete cart[n];
            document.getElementById(`q-${n.replace(/\s/g,'')}`).innerText = cart[n] ? cart[n].q : 0;
            updateCartBar();
        }

        function updateCartBar() {
            let t = 0, q = 0; for(let k in cart) { t += cart[k].p * cart[k].q; q += cart[k].q; }
            document.getElementById('cartBar').classList.toggle('hidden', q === 0);
            document.getElementById('cartCount').innerText = q + " ITEMS";
            document.getElementById('cartTotal').innerText = "₹" + t;
        }

        function searchItems(v) {
            document.querySelectorAll('.product-card').forEach(i => {
                i.style.display = i.getAttribute('data-name').toLowerCase().includes(v.toLowerCase()) ? 'block' : 'none';
            });
        }

        function showCheckout() {
            document.getElementById('checkoutPage').classList.remove('hidden');
            let list = document.getElementById('checkoutList'); list.innerHTML = "";
            for(let k in cart) {
                list.innerHTML += `<div class="flex justify-between font-bold text-sm bg-gray-50 p-4 rounded-2xl"><span>${k} x ${cart[k].q}</span><span>₹${cart[k].p * cart[k].q}</span></div>`;
            }
        }
        function hideCheckout() { document.getElementById('checkoutPage').classList.add('hidden'); }

        function setPay(m) {
            payMode = m;
            document.getElementById('btn-upi').classList.toggle('border-green-600', m==='UPI');
            document.getElementById('btn-cod').classList.toggle('border-green-600', m==='COD');
        }

        function finalOrder() {
            if(!localStorage.getItem('annapurna_addr')) return showAddrModal();
            let total = 0; let items = ""; for(let k in cart) { total += cart[k].p * cart[k].q; items += `- ${k} (${cart[k].q})\n`; }
            let final = (payMode === 'UPI') ? total - 20 : total;
            
            if(payMode === 'UPI') window.location.href = `upi://pay?pa=harshitb357-1@okhdfcbank&pn=AnnapurnaMart&am=${final}&cu=INR`;
            
            let msg = `*NEW ORDER - ${payMode}*\n\n${items}\n*TOTAL: ₹${final}*\n📍 *Addr:* ${localStorage.getItem('annapurna_addr')}`;
            setTimeout(() => window.open(`https://wa.me/919799856807?text=${encodeURIComponent(msg)}`), 1000);
        }

        loadItems();
    </script>
</body>
</html>
