<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blinkit | Annapurna Daily Mart Beawar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50/50 overflow-x-hidden">

    <div id="splash" class="splash-screen">
        <div class="logo-box animate-bounce text-[#f7d150]">A</div>
        <h1 class="splash-text">Annapurna Mart</h1>
        <div class="loading-bar"><div class="progress"></div></div>
    </div>

    <div id="aiNotifier" class="fixed top-24 right-4 z-[2000]"></div>

    <header class="glass-header px-4 py-3 sticky top-0 z-[1000]">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <div class="delivery-badge">10 MINS</div>
                <div class="location-box">
                    <p class="loc-label">Delivering to</p>
                    <p class="loc-text">Beawar, Rajasthan <i class="fa-solid fa-chevron-down"></i></p>
                </div>
            </div>
            <div class="header-icons flex items-center gap-3">
                <div class="security-tag"><i class="fa-solid fa-shield-halved"></i> SECURE</div>
                <div class="user-profile"><i class="fa-regular fa-user"></i></div>
            </div>
        </div>
        <div class="search-container relative">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search 'atta', 'chips', 'milk'..." class="search-input">
            <i class="fa-solid fa-microphone voice-icon" onclick="startVoiceSearch()"></i>
        </div>
    </header>

    <main class="p-4 pb-32">
        <div class="promo-banner" id="mainBanner">
            <div class="relative z-10">
                <p class="promo-sub">Annapurna Exclusive</p>
                <h3 class="promo-title">FREE DELIVERY<br>ON ALL ORDERS</h3>
                <button class="promo-btn">Shop Now</button>
            </div>
            <i class="fa-solid fa-bolt banner-bg-icon"></i>
        </div>

        <div class="category-grid no-scrollbar flex gap-4 overflow-x-auto py-2 mb-6">
            </div>

        <div class="flex justify-between items-center mb-4">
            <h2 class="section-title">Bestsellers in Beawar</h2>
            <span class="see-all">See All <i class="fa-solid fa-arrow-right"></i></span>
        </div>
        <div id="productGrid" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <div id="cartBar" class="cart-capsule hidden shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="cart-icon-box"><i class="fa-solid fa-bag-shopping"></i></div>
            <div>
                <p id="cQty" class="cart-qty-text">0 ITEMS</p>
                <p id="cPrice" class="cart-price-text">₹0</p>
            </div>
        </div>
        <button onclick="toggleCart(true)" class="view-cart-btn">View Cart <i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <div id="overlay" class="drawer-overlay hidden" onclick="toggleCart(false)"></div>
    <div id="cartDrawer" class="cart-drawer">
        <div class="drawer-handle"></div>
        <h2 class="drawer-title">Review Items</h2>
        <div id="cartItemsList" class="cart-items-list no-scrollbar"></div>
        <div class="bill-summary">
            <p class="bill-label">Bill Summary</p>
            <div class="bill-row"><span>Subtotal</span><span id="subTotal">₹0</span></div>
            <div class="bill-row text-blue-600"><span>Delivery Charge</span><span>FREE</span></div>
            <div class="bill-row total-row"><span>To Pay</span><span id="grandTotal">₹0</span></div>
        </div>
        <button onclick="handleCheckout()" class="checkout-btn">Proceed to Pay <i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="nav-item"><i class="fa-solid fa-layer-group"></i><span>Categories</span></div>
        <div class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
