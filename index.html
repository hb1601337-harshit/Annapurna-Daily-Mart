<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blinkit | Annapurna Daily Mart Beawar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50/50">
    <div id="splash" class="splash-screen">
        <div class="logo-box animate-bounce">A</div>
        <h1 class="splash-text">Annapurna Mart</h1>
    </div>

    <div id="aiNotifier" class="fixed top-24 right-4 z-[2000]"></div>

    <header class="glass-header px-4 py-3 sticky top-0 z-[1000]">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <div class="delivery-badge">10 MINS</div>
                <div class="location-box">
                    <p class="loc-label">Delivering to</p>
                    <p class="loc-text">Beawar, Rajasthan <i class="fa-solid fa-chevron-down text-[8px]"></i></p>
                </div>
            </div>
            <div class="user-profile"><i class="fa-regular fa-user"></i></div>
        </div>
        <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="searchInput" placeholder="Search 'chips', 'milk'..." class="search-input">
            <i class="fa-solid fa-microphone absolute right-4 top-1/2 -translate-y-1/2 text-green-600 cursor-pointer" onclick="alert('Voice Search Active')"></i>
        </div>
    </header>

    <main class="p-4 pb-32">
        <div class="promo-banner mb-6" id="mainBanner">
            <h3 class="promo-title">FREE DELIVERY<br>TODAY!</h3>
            <span class="bg-white text-green-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">Valid in Beawar Only</span>
        </div>

        <h2 class="font-black italic text-lg mb-4">Daily Essentials</h2>
        <div id="productGrid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="cartBar" class="cart-capsule hidden">
        <div class="flex items-center gap-3 text-white">
            <div id="cQty" class="font-black text-xs bg-white/20 p-2 rounded-lg">0 ITEMS</div>
            <p id="cPrice" class="font-black text-lg italic">₹0</p>
        </div>
        <button onclick="toggleCart(true)" class="view-cart-btn">View Cart <i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <div id="overlay" class="drawer-overlay hidden" onclick="toggleCart(false)"></div>
    <div id="cartDrawer" class="cart-drawer">
        <div class="drawer-handle"></div>
        <div id="trackingUI"></div> <h2 class="drawer-title">Review Items</h2>
        <div id="cartItemsList" class="space-y-3 mb-6"></div>
        <div class="bill-summary mb-6">
            <div class="flex justify-between font-black text-lg italic pt-2 border-t"><span>To Pay</span><span id="grandTotal">₹0</span></div>
        </div>
        <button onclick="handleCheckout()" id="checkoutBtn" class="checkout-btn">Place Order 🚀</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
